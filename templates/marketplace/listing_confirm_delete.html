{% extends 'base.html' %}
{% block title %}Delete Listing{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <h2 class="font-display fw-bold mb-3">Delete Listing?</h2>
            <p>Are you sure you want to delete <strong>{{ listing.title }}</strong>? This cannot be undone.</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'marketplace:listing_detail' listing.pk %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
