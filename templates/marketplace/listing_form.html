{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <h1 class="font-display fw-bold mb-4" style="color: var(--ubelt-navy);">{{ title }}</h1>
        <div class="card p-4">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-ubelt">Save Listing</button>
                    {% if listing %}
                    <a href="{% url 'marketplace:listing_detail' listing.pk %}" class="btn btn-outline-secondary">Cancel</a>
                    {% else %}
                    <a href="{% url 'marketplace:listing_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    {% endif %}
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
