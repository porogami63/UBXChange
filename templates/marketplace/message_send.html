{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Message Seller{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h2 class="font-display fw-bold mb-3" style="color: var(--ubelt-navy);">Message Seller</h2>
            <p class="text-muted mb-3">Re: <a href="{% url 'marketplace:listing_detail' listing.pk %}">{{ listing.title }}</a></p>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-ubelt">Send Message</button>
                <a href="{% url 'marketplace:listing_detail' listing.pk %}" class="btn btn-outline-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
